name: Build Flutter APK & AAB (signed)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Decode keystore and create signing config
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android/app/steven.keystore
          cat > android/key.properties << EOF
          storePassword=${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          storeFile=steven.keystore
          EOF

      - run: flutter pub get

      - run: flutter build apk --split-per-abi --release

      - run: flutter build appbundle --release

      - name: Sign APKs with apksigner (already signed by Gradle)
        run: echo "APKs and AAB are signed during the build."

      - uses: actions/upload-artifact@v4
        with:
          name: RandomFlutter-APKs
          path: build/app/outputs/flutter-apk/*.apk

      - uses: actions/upload-artifact@v4
        with:
          name: RandomFlutter-AAB
          path: build/app/outputs/bundle/release/*.aab
